services:
  app:
    build:
      context: .
    working_dir: /app
    volumes:
      # The project is bind-mounted so edits on the host are visible inside the
      # container without rebuilding the image.
      - .:/app
      # Composer's cache lives on a named volume to keep installs fast across runs.
      - composer-cache:/tmp/composer-cache
    environment:
      COMPOSER_CACHE_DIR: /tmp/composer-cache

volumes:
  composer-cache:
